services:
  - type: web
    name: lms-backend
    env: node
    buildCommand: npm install --include=dev; npm run build; npx prisma generate; npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: PORT
        value: 8080
    healthCheckPath: /api/health
